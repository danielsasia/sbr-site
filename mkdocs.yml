# mkdocs.yml DEFINITIVO

site_name: "Security By Reason®"
site_url: "https://securitybyreason.org"
site_author: "Daniel Sasia"
site_description: "Un modelo para decidir con criterio cuando la técnica ya no alcanza."

theme:
  name: material
  language: es
  logo: assets/isotipo.png
  favicon: assets/favicon.png

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top

  palette:
    scheme: slate
    primary: black
    accent: indigo

  font:
    text: DM Sans
    code: DM Mono

markdown_extensions:
  - attr_list

copyright: "© 2026 Security By Reason®"

nav:
  - Inicio: index.md
  - El modelo:
      - Qué es Security By Reason: modelo/intro.md
      - Los cinco dominios: modelo/dominios.md
      - Cómo funciona: modelo/como-funciona.md
      - Madurez institucional: modelo/madurez.md
  - El libro:
    - La obra: libro.md
    - Índice comentado: libro/indice.md
    - Por qué es diferente: libro/diferente.md
    - Conseguirlo: libro/comprar.md
  - Cuadernos SBR:
      - Introducción: cuadernos/index.md
      - Cuando compliance reemplaza criterio: cuadernos/compliance-vs-criterio.md
  - Sobre el autor: autor.md
  - Contacto: contacto.md

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
